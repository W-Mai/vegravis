<script type="module" nonce="UxFoWDuDK9IJCQkeY5md2w==">
import init, * as bindings from 'https://w-mai.github.io/vegravis/vegravis-66fe7e6173f30fb8.js';

    <!-- this is the base url relative to which other urls will be constructed. trunk will insert this from the public-url option -->
    <base href="https://w-mai.github.io/vegravis/" />

    <link rel="icon" href="https://w-mai.github.io/vegravis/favicon-2cd869d1febf9f41.png" integrity="sha384&#x2D;8&#x2F;aUAIxsV0wkMVlkMMUzeZOhHYaGM4148vPgCcYr8Wlxi&#x2B;b9ghuX7s3bORJR2yMO"/>


    
    
    
    
    
    


    <link rel="manifest" href="assets/manifest.json">
    <link rel="apple-touch-icon" href="assets/icon_ios_touch_192.png">
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="white">
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#404040">

    <style>
        html {
            /* Remove touch delay: */
            touch-action: manipulation;
        }

        body {
            /* Light mode background color for what is not covered by the egui canvas,
            or where the egui canvas is translucent. */
            background: #909090;
        }

        @media (prefers-color-scheme: dark) {
            body {
                /* Dark mode background color for what is not covered by the egui canvas,
                or where the egui canvas is translucent. */
                background: #404040;
            }
        }

        /* Allow canvas to fill entire web page: */
        html,
        body {
            overflow: hidden;
            margin: 0 !important;
            padding: 0 !important;
            height: 100%;
            width: 100%;
        }

        /* Make canvas fill entire document: */
        canvas {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .centered {
            margin-right: auto;
            margin-left: auto;
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f0f0f0;
            font-size: 24px;
            font-family: Ubuntu-Light, Helvetica, sans-serif;
            text-align: center;
        }

        /* ---------------------------------------------- */
        /* Loading animation from https://loading.io/css/ */
        .lds-dual-ring {
            display: inline-block;
            width: 24px;
            height: 24px;
        }

        .lds-dual-ring:after {
            content: " ";
            display: block;
            width: 24px;
            height: 24px;
            margin: 0px;
            border-radius: 50%;
            border: 3px solid #fff;
            border-color: #fff transparent #fff transparent;
            animation: lds-dual-ring 1.2s linear infinite;
        }

        @keyframes lds-dual-ring {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
<link rel="modulepreload" href="https://w-mai.github.io/vegravis/vegravis-66fe7e6173f30fb8.js" crossorigin=anonymous integrity="sha384-1OOn2O2mkOJ10/iPj1AOrPqpUvO8SM6gE8Ahglertkr8OznAol4dEV3oX2jwZ6BY"><link rel="preload" href="https://w-mai.github.io/vegravis/vegravis-66fe7e6173f30fb8_bg.wasm" crossorigin=anonymous integrity="sha384-M2weObRUDLZVVNhK+iJ1cmzck1Gw/FOslcLUoiiTTTmP0j9gBtdYCGIHEQo43m/E" as="fetch" type="application/wasm"></head>

<body>
<!-- The WASM code will resize the canvas dynamically -->
<!-- the id is hardcoded in main.rs . so, make sure both match. -->
<canvas id="vegravis_canvas"></canvas>

<!-- the loading spinner will be removed in main.rs -->
<div class="centered" id="loading_text">
    <p style="font-size:16px">
        Loading…
    </p>
    <div class="lds-dual-ring"></div>
</div>

<!--Register Service Worker. this will cache the wasm / js scripts for offline use (for PWA functionality). -->
<!-- Force refresh (Ctrl + F5) to load the latest files instead of cached files  -->
<script>
    // We disable caching during development so that we always view the latest version.
    if ('serviceWorker' in navigator && window.location.hash !== "#dev") {
        window.addEventListener('load', function () {
            navigator.serviceWorker.register('sw.js');
        });
    }
</script>
</body>
